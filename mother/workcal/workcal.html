<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>근무 캘린더</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* 기존 스타일은 그대로 유지 (너무 길어 생략) */
    /* ... (기존 CSS 전체 유지) ... */
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <button class="month-nav-btn" id="prevBtn">&#8249;</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="month-nav-btn" id="nextBtn">&#8250;</button>
    <div class="header-actions">
      <!-- Font size control -->
      <div class="font-ctrl">
        <button class="font-ctrl-btn" id="fontDecBtn" title="글자 작게">A−</button>
        <span class="font-size-label" id="fontSizeLabel">14px</span>
        <button class="font-ctrl-btn" id="fontIncBtn" title="글자 크게">A+</button>
      </div>
      <!-- Theme toggle -->
      <button class="theme-toggle" id="themeToggleBtn" title="테마 전환">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
      <button class="icon-btn" id="refreshBtn" title="새로고침">↻</button>
      <button class="save-btn" id="saveBtn">저장</button>
    </div>
  </div>

  <!-- Mode bar -->
  <div class="mode-bar">
    <button class="mode-btn active" data-shift="__VIEW__">조회</button>
    <div class="mode-divider"></div>
    <button class="mode-btn" data-shift="__ERASE__">지우기</button>
    <button class="mode-btn" data-shift="D">D근무</button>
    <button class="mode-btn" data-shift="N">N근무</button>
    <button class="mode-btn" data-shift="DN">DN근무</button>
    <span class="status-text" id="statusText"></span>
  </div>

  <!-- Day labels - 한글로 변경 -->
  <div class="day-labels">
    <span>일</span><span>월</span><span>화</span>
    <span>수</span><span>목</span><span>금</span><span>토</span>
  </div>

  <!-- Calendar -->
  <div class="cal-grid" id="calGrid"></div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot d"></div>D 주간근무</div>
    <div class="legend-item"><div class="legend-dot n"></div>N 야간근무</div>
    <div class="legend-item"><div class="legend-dot dn"></div>DN 연장근무</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInAnonymously, signInWithPopup }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, getFirestore, serverTimestamp, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  "use strict";

  const MODE_VIEW  = "__VIEW__";
  const MODE_ERASE = "__ERASE__";
  const COLLECTION = "workcal";
  const THEME_KEY = "workcal_theme";
  const FONT_KEY  = "workcal_fontsize";
  const FONT_MIN  = 12;
  const FONT_MAX  = 16;
  const FONT_DEF  = 14;

  /* ── Font size ── */
  function getStoredFont() {
    try { return parseInt(localStorage.getItem(FONT_KEY)) || FONT_DEF; }
    catch { return FONT_DEF; }
  }

  function applyFont(size) {
    size = Math.min(FONT_MAX, Math.max(FONT_MIN, size));
    document.documentElement.setAttribute("data-scale", size);
    document.documentElement.style.fontSize = size + "px";
    document.getElementById("fontSizeLabel").textContent = size + "px";
    document.getElementById("fontDecBtn").disabled = (size <= FONT_MIN);
    document.getElementById("fontIncBtn").disabled = (size >= FONT_MAX);
    try { localStorage.setItem(FONT_KEY, size); } catch(e) {}
    return size;
  }

  /* Font buttons 이벤트 리스너 추가 */
  function setupFontControls() {
    const decBtn = document.getElementById("fontDecBtn");
    const incBtn = document.getElementById("fontIncBtn");

    decBtn.addEventListener("click", () => {
      let current = parseInt(document.documentElement.getAttribute("data-scale")) || 14;
      applyFont(current - 1);
    });

    incBtn.addEventListener("click", () => {
      let current = parseInt(document.documentElement.getAttribute("data-scale")) || 14;
      applyFont(current + 1);
    });
  }

  /* ── Theme ── */
  function getStoredTheme() {
    try { return localStorage.getItem(THEME_KEY) || "light"; }  // 기본 light
    catch { return "light"; }
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem(THEME_KEY, theme); } catch {}
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme");
    const next    = current === "dark" ? "light" : "dark";
    applyTheme(next);
    toast(next === "dark" ? "🌙 다크 모드" : "☀️ 라이트 모드");
  }

  // 나머지 코드는 기존과 동일 (생략)

  /* ── Init ── */
  let currentFont = applyFont(getStoredFont());
  applyTheme(getStoredTheme());   // Light 테마로 초기화

  // Font control 초기화
  setupFontControls();

  renderCalendar();
  setStatus("조회");
  ensureAuth(false).then(async ok => {
    if (!ok) { setStatus("인증 대기"); return; }
    const loaded = await loadMonth();
    renderCalendar();
    setStatus(loaded ? "로드 완료" : state.fsLastErr || "오프라인");
  });
</script>

</body>
</html>
