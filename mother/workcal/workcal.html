/* ════════════════════════════════════════
   BASE
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { color-scheme: dark; }
[data-theme="light"] { color-scheme: light; }

/* font-size는 JS가 body.style.fontSize 로만 제어 */
body {
  font-size: 14px;
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2.2em 1em 3.2em;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% -10%, var(--grad1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, var(--grad2) 0%, transparent 60%);
  transition: background .35s ease, color .35s ease, font-size .2s ease;
}

.wrap {
  max-width: 860px;
  margin: 0 auto;
  animation: fadeUp 0.45s cubic-bezier(.22,1,.36,1) both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Smooth token transition on all elements ── */
*, button, .day-cell, .mode-bar, .mode-btn, .shift-tag {
  transition-property: background, background-color, border-color, color, box-shadow, font-size;
  transition-duration: .25s;
  transition-timing-function: ease;
}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
.header {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  margin-bottom: 1.5rem;
}

.month-nav-btn {
  width: 2.4rem; height: 2.4rem;
  border: 1px solid var(--border-hi);
  border-radius: 10px;
  background: var(--surface);
  color: var(--muted2);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.month-nav-btn:hover { background: var(--surface2); color: var(--text); }
.month-nav-btn:active { transform: scale(.93); }

.month-title {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: -0.4px;
  flex: 1;
  text-align: center;
}
.month-title span { color: var(--accent); }

.header-actions { display: flex; gap: 0.5rem; align-items: center; }

.icon-btn {
  width: 2.4rem; height: 2.4rem;
  border: 1px solid var(--border-hi);
  border-radius: 10px;
  background: var(--surface);
  color: var(--muted2);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn:active { transform: scale(.93); }

/* ── Theme toggle ── */
.theme-toggle {
  width: 2.4rem; height: 2.4rem;
  border: 1px solid var(--toggle-border);
  border-radius: 10px;
  background: var(--toggle-bg);
  color: var(--toggle-icon);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
.theme-toggle:hover {
  background: var(--toggle-active-bg);
  border-color: var(--toggle-active-border);
  color: var(--toggle-active-icon);
}
.theme-toggle:active { transform: scale(.93); }

/* sun / moon icons swap */
.theme-toggle .icon-sun,
.theme-toggle .icon-moon {
  position: absolute;
  transition: opacity .3s, transform .3s;
  line-height: 1;
}
[data-theme="dark"]  .icon-sun  { opacity:1; transform:rotate(0deg) scale(1); }
[data-theme="dark"]  .icon-moon { opacity:0; transform:rotate(-90deg) scale(.6); }
[data-theme="light"] .icon-sun  { opacity:0; transform:rotate(90deg) scale(.6); }
[data-theme="light"] .icon-moon { opacity:1; transform:rotate(0deg) scale(1); }

/* ── Font-size control ── */
.font-ctrl {
  display: flex;
  align-items: center;
  gap: 0;
  height: 2.4rem;
  border: 1px solid var(--border-hi);
  border-radius: 10px;
  background: var(--surface);
  overflow: hidden;
  flex-shrink: 0;
}
.font-ctrl-btn {
  width: 2rem; height: 100%;
  border: none;
  background: transparent;
  color: var(--muted2);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.font-ctrl-btn:hover { background: var(--surface2); color: var(--text); }
.font-ctrl-btn:active { transform: scale(.9); }
.font-ctrl-btn:disabled { opacity: .35; cursor: default; }

.font-size-label {
  min-width: 2.6rem;
  text-align: center;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.2px;
  padding: 0 2px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  height: 100%;
  display: flex; align-items: center; justify-content: center;
  white-space: nowrap;
  user-select: none;
}

.save-btn {
  height: 2.4rem;
  padding: 0 1.1rem;
  border-radius: 10px;
  border: 1px solid var(--accent-border);
  background: var(--accent-dim);
  color: var(--accent);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.2px;
}
.save-btn:hover {
  background: rgba(99,210,140,0.2);
  border-color: rgba(99,210,140,0.5);
}
[data-theme="light"] .save-btn:hover {
  background: rgba(22,163,74,0.14);
  border-color: rgba(22,163,74,0.45);
}
.save-btn:active { transform: scale(.97); }

/* ════════════════════════════════════════
   MODE BAR
════════════════════════════════════════ */
.mode-bar {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 1.1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 5px;
  box-shadow: 0 2px 10px var(--shadow);
}

.mode-btn {
  height: 2rem;
  padding: 0 0.8rem;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--muted2);
  cursor: pointer;
  white-space: nowrap;
}
.mode-btn:hover { color: var(--text); background: var(--surface2); }

.mode-btn[data-shift="__VIEW__"].active  { background:var(--surface2); color:var(--text); border-color:var(--border-hi); }
.mode-btn[data-shift="__ERASE__"].active { background:var(--erase-bg); color:var(--erase-fg); border-color:var(--erase-ring); }
.mode-btn[data-shift="D"].active         { background:var(--d-bg);     color:var(--d-fg);    border-color:var(--d-ring); }
.mode-btn[data-shift="N"].active         { background:var(--n-bg);     color:var(--n-fg);    border-color:var(--n-ring); }
.mode-btn[data-shift="DN"].active        { background:var(--dn-bg);    color:var(--dn-fg);   border-color:var(--dn-ring); }

.mode-divider {
  width: 1px; height: 1.3rem;
  background: var(--border-hi);
  flex-shrink: 0;
}

.status-text {
  font-size: 0.72rem;
  color: var(--muted);
  margin-left: auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
  font-family: 'DM Mono', monospace;
}

/* ════════════════════════════════════════
   CALENDAR
════════════════════════════════════════ */
.day-labels {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 4px;
}
.day-labels span {
  text-align: center;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 0.25rem 0;
}
.day-labels span:first-child { color: var(--sun-color); }
.day-labels span:last-child  { color: var(--sat-color); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.day-cell {
  aspect-ratio: 1 / 1.05;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  padding: 0.6rem 0.5rem 0.5rem;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.day-cell:hover {
  border-color: var(--border-hi);
  background: var(--surface2);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px var(--hover-shadow);
}
.day-cell:active { transform: scale(.97); }

.day-cell.empty {
  background: transparent;
  border-color: transparent;
  cursor: default;
  pointer-events: none;
}

.day-cell.today {
  border-color: var(--today-ring);
  box-shadow: 0 0 0 1px var(--today-ring), inset 0 0 18px var(--today-glow);
}
.day-cell.today .day-num { color: var(--accent) !important; font-weight: 700; }

.day-num {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  line-height: 1;
}

.day-cell.sun .day-num { color: var(--sun-color); }
.day-cell.sat .day-num { color: var(--sat-color); }
.day-cell.today .day-num { color: var(--accent) !important; }

.today-dot {
  position: absolute;
  top: 0.5rem; right: 0.5rem;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

.shift-tag {
  margin-top: auto;
  align-self: center;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 0.18rem 0.55rem;
  border-radius: 5px;
  border: 1px solid transparent;
  font-family: 'DM Mono', monospace;
}
.tag-none { opacity: 0; }
.tag-d  { background:var(--d-bg);  color:var(--d-fg);  border-color:var(--d-tag-border); }
.tag-n  { background:var(--n-bg);  color:var(--n-fg);  border-color:var(--n-tag-border); }
.tag-dn { background:var(--dn-bg); color:var(--dn-fg); border-color:var(--dn-tag-border); }

/* ── Legend ── */
.legend {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-top: 1.1rem;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.72rem;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 3px;
  flex-shrink: 0;
}
.legend-dot.d  { background: var(--d-fg); }
.legend-dot.n  { background: var(--n-fg); }
.legend-dot.dn { background: var(--dn-fg); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface2);
  border: 1px solid var(--border-hi);
  border-radius: 12px;
  padding: 0.65rem 1.3rem;
  font-size: 0.8rem;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  font-family: 'DM Mono', monospace;
  box-shadow: 0 8px 32px var(--shadow);
  white-space: nowrap;
  transition: opacity .25s ease, transform .25s ease !important;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Responsive ── */
@media (max-width: 540px) {
  body { padding: 1rem 0.6rem 2rem; }
  .month-title { font-size: 1.1rem; }
  .status-text { display: none; }
  .font-size-label { min-width: 2rem; font-size: 0.65rem; }
  .mode-btn { padding: 0 0.5rem; }
}

  /* ── Helpers ── */
  const monthKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  const dayKey   = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const todayKey = () => { const t = new Date(); return dayKey(t.getFullYear(), t.getMonth(), t.getDate()); };
  const getMonthData = () => {
    const k = monthKey(state.viewDate);
    if (!state.allData[k]) state.allData[k] = {};
    return state.allData[k];
  };
  const errMsg = e => {
    if (!e) return "알 수 없는 오류";
    const m = { "permission-denied":"권한 없음", "unauthenticated":"인증 필요",
                "failed-precondition":"Firestore 미설정", "unavailable":"네트워크 오류" };
    return m[e.code] || e.message || String(e);
  };

  /* ── Toast ── */
  let toastTimer;
  function toast(msg, dur = 2200) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), dur);
  }
  function setStatus(msg) { document.getElementById("statusText").textContent = msg; }

  /* ── Render ── */
  function tagClass(s) {
    return s === "D" ? "tag-d" : s === "N" ? "tag-n" : s === "DN" ? "tag-dn" : "tag-none";
  }

  function renderCalendar() {
    const y        = state.viewDate.getFullYear();
    const m        = state.viewDate.getMonth();
    const firstDay = new Date(y, m, 1).getDay();   // 0=Sun
    const lastDate = new Date(y, m+1, 0).getDate();
    const data     = getMonthData();
    const tKey     = todayKey();

    document.getElementById("monthTitle").innerHTML =
      `${y}년 <span>${m+1}월</span>`;

    const grid = document.getElementById("calGrid");
    grid.innerHTML = "";

    // Empty leading cells
    for (let i = 0; i < firstDay; i++) {
      const c = document.createElement("div");
      c.className = "day-cell empty";
      grid.appendChild(c);
    }

    // Day cells
    for (let d = 1; d <= lastDate; d++) {
      const k       = dayKey(y, m, d);
      const shift   = data[k] || "";
      const isToday = k === tKey;
      const dow     = (firstDay + d - 1) % 7;   // 0=Sun, 6=Sat

      const cell = document.createElement("div");
      cell.className = "day-cell"
        + (isToday      ? " today" : "")
        + (dow === 0    ? " sun"   : "")
        + (dow === 6    ? " sat"   : "");

      cell.innerHTML =
        `<div class="day-num">${String(d).padStart(2,"0")}</div>` +
        (isToday ? `<div class="today-dot"></div>` : "") +
        `<div class="shift-tag ${tagClass(shift)}">${shift || "&nbsp;"}</div>`;

      cell.addEventListener("click", () => {
        const mode  = state.selectedShift;
        if (mode === MODE_VIEW) { toast("조회 모드 — 근무유형을 선택하세요"); return; }
        const store = getMonthData();
        if (mode === MODE_ERASE) {
          if (store[k]) { delete store[k]; toast(`🗑 삭제: ${k}`); }
          else { toast("이미 비어있습니다"); }
        } else {
          store[k] = mode;
          toast(`✓ ${k}  →  ${mode}`);
        }
        renderCalendar();
      });

      grid.appendChild(cell);
    }
  }

  /* ── Auth ── */
  async function anonAuth() {
    if (!auth || state.authReady) return state.authReady;
    try {
      const c = await signInAnonymously(auth);
      state.authReady = true; state.authUid = c.user?.uid; state.authProvider = "anonymous";
      return true;
    } catch(e) { state.fsLastErr = errMsg(e); return false; }
  }
  async function googleAuth() {
    if (!auth) return false;
    try {
      const c = await signInWithPopup(auth, new GoogleAuthProvider());
      state.authReady = true; state.authUid = c.user?.uid; state.authProvider = "google";
      return true;
    } catch(e) { state.fsLastErr = errMsg(e); return false; }
  }
  async function ensureAuth(interactive = false) {
    if (state.authReady) return true;
    return await anonAuth() || (interactive && await googleAuth());
  }

  /* ── Firestore ── */
  async function loadMonth() {
    if (!db || !await ensureAuth(false)) return false;
    const k = monthKey(state.viewDate);
    try {
      const snap = await getDoc(doc(db, COLLECTION, k));
      state.allData[k] = snap.exists() ? (snap.data().schedules || {}) : {};
      return true;
    } catch(e) { state.fsLastErr = errMsg(e); return false; }
  }
  async function saveMonth() {
    if (!db || !await ensureAuth(true)) return false;
    const k = monthKey(state.viewDate);
    try {
      await setDoc(doc(db, COLLECTION, k),
        { month: k, schedules: getMonthData(), updatedAt: serverTimestamp() },
        { merge: true });
      state.fsLastErr = "";
      return true;
    } catch(e) { state.fsLastErr = errMsg(e); return false; }
  }

  /* ── Handlers ── */
  async function changeMonth(offset) {
    const d = state.viewDate;
    state.viewDate = new Date(d.getFullYear(), d.getMonth() + offset, 1);
    renderCalendar();
    const ok = await ensureAuth(true) && await loadMonth();
    renderCalendar();
    setStatus(ok ? "로드 완료" : state.fsLastErr || "연결 실패");
  }

  async function handleSave() {
    toast("저장 중…", 60000);
    const ok = await saveMonth();
    toast(ok
      ? `✓ 저장 완료 (${monthKey(state.viewDate)})`
      : `✗ 저장 실패: ${state.fsLastErr || state.fsUnavailable || "원인 미확인"}`
    );
  }

  function selectMode(shift) {
    state.selectedShift = shift;
    document.querySelectorAll(".mode-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.shift === shift));
    const labels = {
      [MODE_VIEW]: "조회", [MODE_ERASE]: "지우기",
      D: "D근무", N: "N근무", DN: "DN근무"
    };
    setStatus(labels[shift] || shift);
  }

  /* ── Bind ── */
  document.getElementById("prevBtn").addEventListener("click", () => changeMonth(-1));
  document.getElementById("nextBtn").addEventListener("click", () => changeMonth(1));
  document.getElementById("saveBtn").addEventListener("click", handleSave);
  document.getElementById("refreshBtn").addEventListener("click", () => location.reload());
  document.getElementById("themeToggleBtn").addEventListener("click", toggleTheme);
  document.getElementById("fontDecBtn").addEventListener("click", () => {
    currentFont = applyFont(currentFont - 1);
    toast(`글자 크기: ${currentFont}px`);
  });
  document.getElementById("fontIncBtn").addEventListener("click", () => {
    currentFont = applyFont(currentFont + 1);
    toast(`글자 크기: ${currentFont}px`);
  });
  document.querySelectorAll(".mode-btn").forEach(b =>
    b.addEventListener("click", () => selectMode(b.dataset.shift)));

  /* ── Init ── */
  renderCalendar();
  setStatus("조회");
  ensureAuth(false).then(async ok => {
    if (!ok) { setStatus("인증 대기"); return; }
    const loaded = await loadMonth();
    renderCalendar();
    setStatus(loaded ? "로드 완료" : state.fsLastErr || "오프라인");
  });
</script>

</body>
</html>
