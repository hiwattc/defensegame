  --d-bg:   #0f2a4a;
  --d-fg:   #60b3ff;
  --d-ring: rgba(96,179,255,0.25);

  --n-bg:   #1a1440;
  --n-fg:   #a78bfa;
  --n-ring: rgba(167,139,250,0.25);

  --dn-bg:   #2a1800;
  --dn-fg:   #fb923c;
  --dn-ring: rgba(251,146,60,0.25);

  --today-ring: rgba(99,210,140,0.6);
  --today-glow: rgba(99,210,140,0.12);
  --accent:    #63d28c;

  --erase-bg:  #2a1520;
  --erase-fg:  #f87171;
  --erase-ring:rgba(248,113,113,0.25);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 16px 48px;
  /* subtle noise texture */
  background-image:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(63,120,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(99,210,140,0.04) 0%, transparent 60%);
}

.wrap {
  max-width: 860px;
  margin: 0 auto;
  animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}

.month-nav-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border-hi);
  border-radius: 10px;
  background: var(--surface);
  color: var(--muted2);
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s, border-color .15s, transform .1s;
  flex-shrink: 0;
}
.month-nav-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-hi); }
.month-nav-btn:active { transform: scale(.94); }

.month-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  flex: 1;
  text-align: center;
}
.month-title span {
  color: var(--accent);
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border-hi);
  border-radius: 10px;
  background: var(--surface);
  color: var(--muted2);
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s, transform .1s;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn:active { transform: scale(.94); }

.save-btn {
  height: 36px;
  padding: 0 18px;
  border-radius: 10px;
  border: 1px solid rgba(99,210,140,0.3);
  background: rgba(99,210,140,0.1);
  color: var(--accent);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .1s;
  letter-spacing: 0.2px;
}
.save-btn:hover { background: rgba(99,210,140,0.18); border-color: rgba(99,210,140,0.5); }
.save-btn:active { transform: scale(.97); }

/* ── Mode selector ── */
.mode-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px;
}

.mode-btn {
  height: 32px;
  padding: 0 14px;
  border-radius: 9px;
  border: 1px solid transparent;
  background: transparent;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--muted2);
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}
.mode-btn:hover { color: var(--text); background: var(--surface2); }

.mode-btn[data-shift="__VIEW__"].active {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--border-hi);
}
.mode-btn[data-shift="__ERASE__"].active {
  background: var(--erase-bg);
  color: var(--erase-fg);
  border-color: var(--erase-ring);
}
.mode-btn[data-shift="D"].active {
  background: var(--d-bg);
  color: var(--d-fg);
  border-color: var(--d-ring);
}
.mode-btn[data-shift="N"].active {
  background: var(--n-bg);
  color: var(--n-fg);
  border-color: var(--n-ring);
}
.mode-btn[data-shift="DN"].active {
  background: var(--dn-bg);
  color: var(--dn-fg);
  border-color: var(--dn-ring);
}

.mode-divider {
  width: 1px;
  height: 20px;
  background: var(--border-hi);
  flex-shrink: 0;
}

.status-text {
  font-size: 11.5px;
  color: var(--muted);
  margin-left: auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
  font-family: 'DM Mono', monospace;
}

/* ── Calendar grid ── */
.day-labels {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-bottom: 5px;
}
.day-labels span {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 4px 0;
}
.day-labels span:first-child { color: #e05555; }
.day-labels span:last-child  { color: #4a90d9; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day-cell {
  aspect-ratio: 1 / 1.05;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  padding: 10px 8px 8px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  cursor: pointer;
  transition: border-color .18s, background .18s, box-shadow .18s, transform .1s;
  position: relative;
  overflow: hidden;
}
.day-cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: transparent;
  transition: background .18s;
  border-radius: inherit;
}
.day-cell:hover {
  border-color: var(--border-hi);
  background: var(--surface2);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}
.day-cell:active { transform: scale(.97) translateY(0); }
.day-cell.empty  { background: rgba(20,23,32,0.4); cursor: default; border-color: rgba(255,255,255,0.03); }
.day-cell.empty:hover { transform: none; box-shadow: none; }

.day-cell.today {
  border-color: var(--today-ring);
  box-shadow: 0 0 0 1px var(--today-ring), inset 0 0 20px var(--today-glow);
}
.day-cell.today .day-num { color: var(--accent); font-weight: 700; }

/* Sunday / Saturday color */
.day-cell:nth-child(7n+1) .day-num { color: #e05555; }
.day-cell:nth-child(7n)   .day-num { color: #4a90d9; }
.day-cell.today .day-num { color: var(--accent) !important; }

.day-num {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  line-height: 1;
}

.shift-tag {
  margin-top: auto;
  align-self: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 10px;
  border-radius: 6px;
  border: 1px solid transparent;
  font-family: 'DM Mono', monospace;
  transition: all .2s;
}

.tag-none { opacity: 0; }

.tag-d  { background: var(--d-bg);  color: var(--d-fg);  border-color: rgba(96,179,255,0.2); }
.tag-n  { background: var(--n-bg);  color: var(--n-fg);  border-color: rgba(167,139,250,0.2); }
.tag-dn { background: var(--dn-bg); color: var(--dn-fg); border-color: rgba(251,146,60,0.2); }

/* Today badge */
.today-dot {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

/* ── Legend chips at bottom ── */
.legend {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 3px;
}
.legend-dot.d  { background: var(--d-fg); }
.legend-dot.n  { background: var(--n-fg); }
.legend-dot.dn { background: var(--dn-fg); }

/* ── Responsive ── */
@media (max-width: 520px) {
  body { padding: 16px 10px 32px; }
  .month-title { font-size: 17px; }
  .status-text { display: none; }
  .day-cell { border-radius: 8px; padding: 7px 5px 6px; }
  .shift-tag { font-size: 9px; padding: 2px 6px; }
  .day-num { font-size: 11px; }
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border-hi);
  border-radius: 12px;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  white-space: nowrap;
  z-index: 999;
  font-family: 'DM Mono', monospace;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

<body>
<div class="wrap">

  <!-- Header -->

  <div class="header">
    <button class="month-nav-btn" id="prevBtn">&#8249;</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="month-nav-btn" id="nextBtn">&#8250;</button>
    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" title="새로고침">↻</button>
      <button class="save-btn" id="saveBtn">저장</button>
    </div>
  </div>

  <!-- Mode bar -->

  <div class="mode-bar">
    <button class="mode-btn active" data-shift="__VIEW__">조회</button>
    <div class="mode-divider"></div>
    <button class="mode-btn" data-shift="__ERASE__">지우기</button>
    <button class="mode-btn" data-shift="D">D근무</button>
    <button class="mode-btn" data-shift="N">N근무</button>
    <button class="mode-btn" data-shift="DN">DN근무</button>
    <span class="status-text" id="statusText"></span>
  </div>

  <!-- Day labels -->

  <div class="day-labels">
    <span>SUN</span><span>MON</span><span>TUE</span>
    <span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
  </div>

  <!-- Calendar -->

  <div class="cal-grid" id="calGrid"></div>

  <!-- Legend -->

  <div class="legend">
    <div class="legend-item"><div class="legend-dot d"></div>D 주간근무</div>
    <div class="legend-item"><div class="legend-dot n"></div>N 야간근무</div>
    <div class="legend-item"><div class="legend-dot dn"></div>DN 연장근무</div>
  </div>
</div>

<!-- Toast -->

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInAnonymously, signInWithPopup }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, getFirestore, serverTimestamp, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  "use strict";

  const MODE_VIEW  = "__VIEW__";
  const MODE_ERASE = "__ERASE__";
  const COLLECTION = "workcal";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDv8E7ZRPcLIF6dIMcvVfpolPYqIy6UjhU",
    authDomain: "momworkcal.firebaseapp.com",
    projectId: "momworkcal",
    storageBucket: "momworkcal.firebasestorage.app",
    messagingSenderId: "968519288658",
    appId: "1:968519288658:web:9b0f02431bd3f433151c8b",
    measurementId: "G-X92BNRR5ZK",
  };

  const state = {
    viewDate: new Date(),
    selectedShift: MODE_VIEW,
    allData: {},
    fsUnavailable: "",
    fsLastErr: "",
    authReady: false,
    authUid: "",
    authProvider: "",
  };

  /* ── Firebase init ── */
  const fb = (() => {
    if (!FIREBASE_CONFIG.apiKey || location.protocol === "file:") return null;
    try {
      const app = initializeApp(FIREBASE_CONFIG);
      return { db: getFirestore(app), auth: getAuth(app) };
    } catch(e) { state.fsUnavailable = e.message; return null; }
  })();
  const db   = fb?.db   ?? null;
  const auth = fb?.auth ?? null;

  /* ── Helpers ── */
  const monthKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  const dayKey   = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const todayKey = () => { const t=new Date(); return dayKey(t.getFullYear(),t.getMonth(),t.getDate()); };
  const getMonthData = () => {
    const k = monthKey(state.viewDate);
    if (!state.allData[k]) state.allData[k] = {};
    return state.allData[k];
  };
  const errMsg = e => {
    if (!e) return "알 수 없는 오류";
    const map = { "permission-denied":"권한 없음", "unauthenticated":"인증 필요",
                  "failed-precondition":"Firestore 미설정", "unavailable":"네트워크 오류" };
    return map[e.code] || e.message || String(e);
  };

  /* ── Toast ── */
  let toastTimer;
  function toast(msg, duration=2400) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), duration);
  }
  function setStatus(msg) {
    document.getElementById("statusText").textContent = msg;
  }

  /* ── Render ── */
  function tagClass(shift) {
    return shift === "D" ? "tag-d" : shift === "N" ? "tag-n" : shift === "DN" ? "tag-dn" : "tag-none";
  }

  function renderCalendar() {
    const y = state.viewDate.getFullYear();
    const m = state.viewDate.getMonth();
    const firstDay = new Date(y, m, 1).getDay();
    const lastDate = new Date(y, m+1, 0).getDate();
    const data     = getMonthData();
    const tKey     = todayKey();

    // Month title
    const el = document.getElementById("monthTitle");
    el.innerHTML = `${y}년 <span>${m+1}월</span>`;

    const grid = document.getElementById("calGrid");
    grid.innerHTML = "";

    // Empty cells
    for (let i=0; i<firstDay; i++) {
      const c = document.createElement("div");
      c.className = "day-cell empty";
      grid.appendChild(c);
    }

    // Day cells
    for (let d=1; d<=lastDate; d++) {
      const k     = dayKey(y, m, d);
      const shift = data[k] || "";
      const isToday = k === tKey;

      const cell = document.createElement("div");
      cell.className = "day-cell" + (isToday ? " today" : "");

      cell.innerHTML =
        `<div class="day-num">${String(d).padStart(2,"0")}</div>` +
        (isToday ? `<div class="today-dot"></div>` : "") +
        `<div class="shift-tag ${tagClass(shift)}">${shift || "&nbsp;"}</div>`;

      cell.addEventListener("click", () => {
        const mode = state.selectedShift;
        if (mode === MODE_VIEW) { toast("조회 모드 — 근무유형을 선택하세요"); return; }
        const store = getMonthData();
        if (mode === MODE_ERASE) {
          if (store[k]) { delete store[k]; toast(`삭제 ${k}`); }
          else toast("이미 비어있습니다");
        } else {
          store[k] = mode;
          toast(`${k} → ${mode}`);
        }
        renderCalendar();
      });

      grid.appendChild(cell);
    }
  }

  /* ── Auth ── */
  async function anonAuth() {
    if (!auth || state.authReady) return state.authReady;
    try {
      const c = await signInAnonymously(auth);
      state.authReady = true; state.authUid = c.user?.uid; state.authProvider = "anonymous";
      return true;
    } catch(e) { state.fsLastErr = errMsg(e); return false; }
  }
  async function googleAuth() {
    if (!auth) return false;
    try {
      const c = await signInWithPopup(auth, new GoogleAuthProvider());
      state.authReady = true; state.authUid = c.user?.uid; state.authProvider = "google";
      return true;
    } catch(e) { state.fsLastErr = errMsg(e); return false; }
  }
  async function ensureAuth(interactive=false) {
    if (state.authReady) return true;
    return await anonAuth() || (interactive && await googleAuth());
  }

  /* ── Firestore ── */
  async function loadMonth() {
    if (!db || !await ensureAuth(false)) return false;
    const k = monthKey(state.viewDate);
    try {
      const snap = await getDoc(doc(db, COLLECTION, k));
      state.allData[k] = snap.exists() ? (snap.data().schedules || {}) : {};
      return true;
    } catch(e) { state.fsLastErr = errMsg(e); return false; }
  }

  async function saveMonth() {
    if (!db || !await ensureAuth(true)) return false;
    const k = monthKey(state.viewDate);
    try {
      await setDoc(doc(db, COLLECTION, k),
        { month: k, schedules: getMonthData(), updatedAt: serverTimestamp() },
        { merge: true });
      state.fsLastErr = "";
      return true;
    } catch(e) { state.fsLastErr = errMsg(e); return false; }
  }

  /* ── Event handlers ── */
  async function changeMonth(offset) {
    const d = state.viewDate;
    state.viewDate = new Date(d.getFullYear(), d.getMonth()+offset, 1);
    renderCalendar();
    const ok = await ensureAuth(true) && await loadMonth();
    renderCalendar();
    setStatus(ok ? "로드 완료" : state.fsLastErr || "연결 실패");
  }

  async function handleSave() {
    toast("저장 중…", 60000);
    const ok = await saveMonth();
    if (ok) {
      toast(`저장 완료 (${monthKey(state.viewDate)})`);
    } else {
      toast(`저장 실패: ${state.fsLastErr || state.fsUnavailable || "원인 미확인"}`);
    }
  }

  function selectMode(shift) {
    state.selectedShift = shift;
    document.querySelectorAll(".mode-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.shift === shift);
    });
    const labels = { [MODE_VIEW]:"조회", [MODE_ERASE]:"지우기", D:"D근무", N:"N근무", DN:"DN근무" };
    setStatus(labels[shift] || shift);
  }

  /* ── Bind ── */
  document.getElementById("prevBtn").addEventListener("click",    () => changeMonth(-1));
  document.getElementById("nextBtn").addEventListener("click",    () => changeMonth(1));
  document.getElementById("saveBtn").addEventListener("click",    handleSave);
  document.getElementById("refreshBtn").addEventListener("click", () => location.reload());
  document.querySelectorAll(".mode-btn").forEach(b => {
    b.addEventListener("click", () => selectMode(b.dataset.shift));
  });

  /* ── Init ── */
  renderCalendar();
  setStatus("조회");
  ensureAuth(false).then(async ok => {
    if (!ok) { setStatus("인증 대기"); return; }
    const loaded = await loadMonth();
    renderCalendar();
    setStatus(loaded ? "로드 완료" : (state.fsLastErr || "오프라인"));
  });
</script>
